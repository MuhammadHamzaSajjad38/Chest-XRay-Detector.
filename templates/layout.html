<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Chest X-ray Analysis FYP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" style="height: 50px; width: 50px; border-radius: 50%; margin-right: 15px;" alt="Logo">
                <span style="font-size: 1.25rem; font-weight: bold;">Chest X-Ray Analysis</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- =================================== -->
                    <!--          *** KEY CHANGE ***         -->
                    <!-- Added fw-bold class to each nav-link -->
                    <!-- Removed all 'active' class logic -->
                    <!-- =================================== -->
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('index') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('detector') }}">Detector</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('about') }}">About Project</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('technology') }}">How It Works</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('dataset') }}">Dataset</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('results') }}">Model Results</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('team') }}">Our Team</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">© 2025 University of Mianwali | Chest X-ray Analysis FYP</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
